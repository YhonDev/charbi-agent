[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v 
    --tb=short 
    --strict-markers
    --cov=kernel
    --cov-report=html:tests/coverage/html
    --cov-report=xml:tests/coverage/xml/coverage.xml
    --cov-report=json:tests/coverage/json/coverage.json
    --cov-fail-under=80
    --asyncio-mode=auto
    --maxfail=5
    --dist=loadscope
    --asyncio-mode=auto

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (medium, multiple components)
    e2e: End-to-end tests (slow, full system)
    slow: Tests that take more than 5 seconds
    requires_kernel: Tests that require kernel running
    requires_memory: Tests that require memory server running
    requires_llm: Tests that require LLM connection

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

asyncio_mode = auto
