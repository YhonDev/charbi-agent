system:
  name: Charbi
  version: 1.0
  mode: autonomous
models:
  router: gpt-oss:120b-cloud
  fallback: openrouter-auto
  test_role: test_model
memory:
  kernel_db: charbi/memory/kernel.db
  sessions_db: charbi/memory/sessions.db
supervisor:
  enabled: false
  policy_file: charbi/config/policies/default.yaml
  max_cpu_time: 30000
  max_tool_calls: 100
  emergency_kill: false
runtime:
  session_path: charbi/runtime/sessions
  isolate_workspace: true
  autonomy:
    enabled: true
    mode: free
    maxDepth: 5
    maxActionsPerSession: 50
    maxExecutionTimeMs: 60000
    allowShell: true
    allowNetwork: true
channels:
  telegram:
    enabled: true
    token_env: TELEGRAM_TOKEN
    bot_token: 8474865879:AAFT9tGh5VAThl7SOl1mKOOFTS1a5a9gOmk
  whatsapp:
    enabled: false
  cli:
    enabled: true
skills:
  allow_openclaw: true
  auto_load_directory: charbi/agents
  clawhub: true
  github: true
  web_search: true
  filesystem: true
  shell: true
provider:
  name: ollama
  enabled: true
  model: gpt-oss:120b-cloud
  auth_type: none
  endpoint: http://localhost:11434/v1
gateway:
  port: 18790
  host: 0.0.0.0
  auth_enabled: null
  auth_token: null
