system:
  name: Charbi
  version: 1.0
  mode: development
models:
  router: qwen-max
  fallback: openrouter-auto
  test_role: test_model
memory:
  kernel_db: charbi/memory/kernel.db
  sessions_db: charbi/memory/sessions.db
supervisor:
  enabled: null
  policy_file: charbi/config/policies/default.yaml
  max_cpu_time: 5000
  max_tool_calls: 20
  emergency_kill: true
runtime:
  session_path: charbi/runtime/sessions
  isolate_workspace: null
  autonomy:
    enabled: null
    mode: governed
    maxDepth: 2
    maxActionsPerSession: 15
    maxExecutionTimeMs: 30000
    allowShell: false
    allowNetwork: false
channels:
  telegram:
    enabled: true
    token_env: TELEGRAM_TOKEN
    bot_token: 8474865879:AAFT9tGh5VAThl7SOl1mKOOFTS1a5a9gOmk
  whatsapp:
    enabled: false
  cli:
    enabled: true
skills:
  allow_openclaw: true
  auto_load_directory: charbi/agents
  clawhub: true
  github: true
  web_search: true
  filesystem: true
  shell: false
provider:
  name: qwen
  enabled: true
  model: qwen-max
  auth_type: oauth
  endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1
gateway:
  port: 18789
  host: 0.0.0.0
  auth_enabled: null
  auth_token: null
